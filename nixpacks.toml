# Nixpacks configuration for Railway
# This is Railway's default build system

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# Install ALL dependencies (including devDependencies needed for build)
# Railway's build phase runs "npm install && npm run build" by default
# We need to ensure devDependencies are installed even with NODE_ENV=production
cmds = ["npm ci --include=dev"]

[phases.build]
# Build the TypeScript project (requires @nestjs/cli from devDependencies)
cmds = ["npm run build"]

[start]
cmd = "npm run start:prod"

[variables]
# Don't set NODE_ENV here - it causes npm ci to skip devDependencies in install phase
