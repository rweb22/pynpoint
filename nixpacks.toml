# Nixpacks configuration for Railway
# This is Railway's default build system

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# Install ALL dependencies including devDependencies
cmds = [
  "NODE_ENV=development npm install"
]

[phases.build]
# Build the TypeScript project
cmds = [
  "npx nest build",
  "ls -la dist/",
  "test -f dist/main.js && echo 'Build successful!' || (echo 'Build failed - main.js not found' && exit 1)"
]

[start]
cmd = "npm run start:prod"

[variables]
# Don't set NODE_ENV here - it causes npm ci to skip devDependencies in install phase
