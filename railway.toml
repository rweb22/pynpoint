# Railway Configuration for PinPoint India API Service

[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npm run start:prod"
healthcheckPath = "/health"
healthcheckTimeout = 7200
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.environmentVariables]]
name = "NODE_ENV"
value = "development"

[[deploy.environmentVariables]]
name = "PORT"
value = "3000"

# Note: DATABASE_URL and REDIS_URL will be injected automatically
# from PostgreSQL and Redis services via Railway's service linking
